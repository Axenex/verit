# Void GitLab CI — Node 20.18.2
#
# Stages:
#   validate — Linux: npm ci, buildreact, compile
#   test     — Linux: Node unit tests against out/
#   package  — Windows: portable Void win32-x64 zip (SaaS Windows runner)
#
# Intentionally omitted for now:
#   - Full ESLint (fails on the unchanged baseline per project guidance)
#   - Browser / smoke tests (heavy; need Electron + Playwright setup)
#
# Cache: npm download cache (.npm), keyed by package-lock.json
# Windows: requires GitLab.com SaaS Windows runners (tag saas-windows-medium-amd64).
# Push this branch to a GitLab project remote to run the pipeline.

stages:
  - validate
  - test
  - package

variables:
  NODE_OPTIONS: "--max-old-space-size=8192"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  # Skip heavy optional downloads during Linux validate/test installs.
  # Windows package job overrides ELECTRON_SKIP_BINARY_DOWNLOAD.
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# Shared npm cache: local download cache only (not node_modules)
.npm_cache: &npm_cache
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

.linux_node_job:
  image: node:20.18.2
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends
        build-essential
        g++
        pkg-config
        python3
        libx11-dev
        libxkbfile-dev
        libsecret-1-dev
        libkrb5-dev
    - node -v
    - npm -v
    - test "$(node -v)" = "v20.18.2"

.validate_npm_ci: &validate_npm_ci |
  set -e
  for i in 1 2 3 4 5; do
    npm ci && break
    if [ "$i" -eq 5 ]; then
      echo "npm ci failed too many times" >&2
      exit 1
    fi
    echo "npm ci failed ($i), retrying..."
    sleep $((i * 5))
  done

validate:
  extends: .linux_node_job
  stage: validate
  timeout: 2h
  cache:
    <<: *npm_cache
    policy: pull-push
  script:
    - *validate_npm_ci
    - npm run buildreact
    - npm run compile
  artifacts:
    name: "compiled-out-$CI_COMMIT_SHORT_SHA"
    paths:
      - out/
    expire_in: 1 hour
    when: on_success

test:
  extends: .linux_node_job
  stage: test
  timeout: 30m
  needs:
    - job: validate
      artifacts: true
  cache:
    <<: *npm_cache
    policy: pull
  script:
    - *validate_npm_ci
    - test -d out
    - npm run test-node

# ------------------------------------------------------------------ Windows portable app
# Runs on GitLab.com hosted Windows runners (not Docker). Independent of Linux jobs.
build:windows:
  stage: package
  tags:
    - saas-windows-medium-amd64
  needs: []
  timeout: 3h
  variables:
    ELECTRON_SKIP_BINARY_DOWNLOAD: "0"
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    npm_config_build_from_source: "true"
  rules:
    # Branch pushes (CI_COMMIT_BRANCH) and MR pipelines (source branch name).
    - if: $CI_COMMIT_BRANCH =~ /^Axen\/gitlab-windows-build-/
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^Axen\/gitlab-windows-build-/
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
  before_script:
    # Avoid Chocolatey MSI downgrades (exit 1603 on SaaS images that ship Node 21).
    # Install the .nvmrc pin from the official Windows zip onto PATH for this job.
    - |
      $ErrorActionPreference = 'Stop'
      $ver = '20.18.2'
      $zip = Join-Path $env:TEMP "node-v$ver-win-x64.zip"
      $dest = 'C:\nodejs'
      Invoke-WebRequest -Uri "https://nodejs.org/dist/v$ver/node-v$ver-win-x64.zip" -OutFile $zip
      if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
      if (Test-Path "C:\node-v$ver-win-x64") { Remove-Item -Recurse -Force "C:\node-v$ver-win-x64" }
      Expand-Archive -Path $zip -DestinationPath 'C:\' -Force
      Rename-Item -Path "C:\node-v$ver-win-x64" -NewName 'nodejs'
      $env:Path = "$dest;" + [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
      [Environment]::SetEnvironmentVariable('Path', $env:Path, 'Process')
      node -v
      npm -v
      if ((node -v) -ne "v$ver") { throw "Expected Node v$ver, got $(node -v)" }
      $py = Get-Command python, python3, py -ErrorAction SilentlyContinue | Select-Object -First 1
      if (-not $py) { throw 'Python not found on Windows runner PATH' }
      & $py.Source --version
    # Void/VS Code native modules require Spectre-mitigated MSVC libs (MSB8040 otherwise).
    - |
      $ErrorActionPreference = 'Stop'
      $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
      if (-not (Test-Path $vswhere)) { Write-Error 'vswhere.exe not found'; exit 1 }
      if (-not (Test-Path $setup)) { Write-Error 'setup.exe not found'; exit 1 }
      $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
      if (-not $installPath) { Write-Error 'Visual Studio C++ toolset not found'; exit 1 }
      Write-Host "VS installPath=$installPath"

      function Test-SpectreLibs {
        param([string]$Root)
        $msvc = Get-ChildItem (Join-Path $Root 'VC\Tools\MSVC') -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
        if (-not $msvc) { return $false }
        return (Test-Path (Join-Path $msvc.FullName 'lib\spectre\x64'))
      }

      if (Test-SpectreLibs $installPath) {
        Write-Host 'Spectre-mitigated libs already present'
      } else {
        Write-Host 'Installing Spectre-mitigated VS components via setup.exe...'
        # Call setup.exe directly so LASTEXITCODE is reliable (Start-Process returned 87).
        & $setup modify `
          --installPath $installPath `
          --add Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre `
          --add Microsoft.VisualStudio.Component.VC.ATL.Spectre `
          --add Microsoft.VisualStudio.Component.VC.ATLMFC.Spectre `
          --quiet --wait --norestart
        $code = $LASTEXITCODE
        Write-Host "setup.exe exit=$code"
        if ($code -notin 0, 3010) {
          Write-Host 'setup.exe failed; trying Chocolatey workload params fallback...'
          choco install visualstudio2022-workload-vctools -y --package-parameters "--add Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre --add Microsoft.VisualStudio.Component.VC.ATL.Spectre --add Microsoft.VisualStudio.Component.VC.ATLMFC.Spectre --passive --norestart"
          if ($LASTEXITCODE -ne 0) { Write-Error "Chocolatey Spectre install failed ($LASTEXITCODE)"; exit 1 }
        }
        if (-not (Test-SpectreLibs $installPath)) {
          Write-Error 'Spectre libs still missing after install'
          exit 1
        }
        Write-Host 'Spectre-mitigated libs installed'
      }
  script:
    - |
      $env:Path = 'C:\nodejs;' + [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
    - node -v
    - npm -v
    - npm install
    - npm run buildreact
    - npm run download-builtin-extensions
    - npm run gulp vscode-win32-x64
    - New-Item -ItemType Directory -Force -Path dist | Out-Null
    - |
      $out = Join-Path $env:CI_PROJECT_DIR '..\VSCode-win32-x64'
      if (-not (Test-Path $out)) { throw "Expected build output missing: $out" }
      Compress-Archive -Path (Join-Path $out '*') -DestinationPath 'dist\Void-win32-x64.zip' -Force
      Get-Item 'dist\Void-win32-x64.zip' | Format-List FullName, Length
    # Best-effort Inno Setup installers (non-fatal)
    - npm run gulp vscode-win32-x64-inno-updater; if ($LASTEXITCODE -ne 0) { Write-Host "inno-updater failed (non-fatal)" }
    - npm run gulp vscode-win32-x64-system-setup; if ($LASTEXITCODE -ne 0) { Write-Host "system-setup failed (non-fatal)" }
    - npm run gulp vscode-win32-x64-user-setup; if ($LASTEXITCODE -ne 0) { Write-Host "user-setup failed (non-fatal)" }
    - if (Test-Path '.build\win32-x64\system-setup\VSCodeSetup.exe') { Copy-Item '.build\win32-x64\system-setup\VSCodeSetup.exe' 'dist\VoidSetup-x64.exe' }
    - if (Test-Path '.build\win32-x64\user-setup\VSCodeSetup.exe') { Copy-Item '.build\win32-x64\user-setup\VSCodeSetup.exe' 'dist\VoidUserSetup-x64.exe' }
  artifacts:
    name: "void-win32-x64-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
    expire_in: 1 week
    when: on_success
