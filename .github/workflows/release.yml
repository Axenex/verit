name: Release

# Builds Void for Windows, macOS, and Linux and publishes the artifacts to a GitHub Release.
#
# Trigger it by pushing a version tag (recommended):
#   git tag v1.4.10 && git push origin v1.4.10
# ...or run it manually from the Actions tab (workflow_dispatch) and pass a tag name.
#
# Notes:
# - This produces runnable *portable* builds (the archives contain the real Void executable,
#   including Void.exe on Windows). It also makes a best-effort attempt at the Windows Inno
#   Setup installer (.exe) and a Linux .deb; those steps do not fail the release if they error,
#   because a fully signed installer needs code-signing certificates (see build/azure-pipelines).
# - Node version is pinned by .nvmrc (20.18.2).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/publish (e.g. v1.4.10)'
        required: true
        type: string
      prerelease:
        description: 'Mark the release as a prerelease'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  # native modules are compiled from source against the Electron headers (see .npmrc)
  npm_config_build_from_source: 'true'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04
            gulp_target: vscode-linux-x64
            build_dir: VSCode-linux-x64
          - name: win32-x64
            runner: windows-2022
            gulp_target: vscode-win32-x64
            build_dir: VSCode-win32-x64
          - name: darwin-arm64
            runner: macos-14
            gulp_target: vscode-darwin-arm64
            build_dir: VSCode-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev fakeroot rpm

      - name: Install npm dependencies
        run: npm install

      - name: Build Void React UI
        run: npm run buildreact

      - name: Verify Void React bundles
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $reactOut = Join-Path $env:GITHUB_WORKSPACE 'src\vs\workbench\contrib\void\browser\react\out'
          $entries = @(
            'sidebar-tsx\index.js',
            'void-settings-tsx\index.js',
            'void-onboarding\index.js',
            'quick-edit-tsx\index.js',
            'void-editor-widgets-tsx\index.js',
            'void-tooltip\index.js',
            'diff\index.js'
          )
          foreach ($rel in $entries) {
            $p = Join-Path $reactOut $rel
            if (-not (Test-Path -LiteralPath $p)) { throw "Missing Void React bundle after buildreact: $p" }
            Write-Host "OK react out $rel"
          }

      - name: Download built-in extensions
        run: npm run download-builtin-extensions

      - name: Build application (${{ matrix.gulp_target }})
        run: npm run gulp ${{ matrix.gulp_target }}

      # ---- Windows: portable zip + required Inno Setup installer(s) ----
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:GITHUB_WORKSPACE '..\${{ matrix.build_dir }}'
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path (Join-Path $out '*') -DestinationPath (Join-Path 'artifacts' 'Void-${{ matrix.name }}.zip') -Force
          & "$env:GITHUB_WORKSPACE\scripts\verify-void-win32-package.ps1" -AppDir $out

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          npm run gulp vscode-win32-x64-inno-updater
          npm run gulp vscode-win32-x64-system-setup
          npm run gulp vscode-win32-x64-user-setup
          $systemSetup = '.build\win32-x64\system-setup\VSCodeSetup.exe'
          $userSetup = '.build\win32-x64\user-setup\VSCodeSetup.exe'
          if (-not (Test-Path -LiteralPath $systemSetup)) { throw "Missing system installer: $systemSetup" }
          if (-not (Test-Path -LiteralPath $userSetup)) { throw "Missing user installer: $userSetup" }
          Copy-Item $systemSetup (Join-Path 'artifacts' 'VoidSetup-x64.exe') -Force
          Copy-Item $userSetup (Join-Path 'artifacts' 'VoidUserSetup-x64.exe') -Force
          & "$env:GITHUB_WORKSPACE\scripts\verify-void-win32-package.ps1" `
            -AppDir (Join-Path $env:GITHUB_WORKSPACE '..\${{ matrix.build_dir }}') `
            -DistDir (Join-Path $env:GITHUB_WORKSPACE 'artifacts') `
            -RequireInstallers

      # ---- macOS: zip the .app bundle ----
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cd "$GITHUB_WORKSPACE/../${{ matrix.build_dir }}"
          zip -ry "$GITHUB_WORKSPACE/artifacts/Void-${{ matrix.name }}.zip" ./*.app

      # ---- Linux: portable tar.gz + best-effort .deb ----
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/Void-${{ matrix.name }}.tar.gz" -C "$GITHUB_WORKSPACE/.." "${{ matrix.build_dir }}"

      - name: Build Linux .deb (best-effort)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          npm run gulp vscode-linux-x64-build-deb
          find .build/linux/deb -name '*.deb' -exec cp {} artifacts/ \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: void-${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/**/*
